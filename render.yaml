# Render Blueprint for the TrustLayer API (FastAPI).
# Deploy: render.com -> New -> Blueprint -> connect this repo.
# Secret values (keys, DB URL) are marked sync:false -> set them in the dashboard.
services:
  - type: web
    name: trustlayer-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # --- non-secret config (safe to commit) ---
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-3-flash-preview,gemini-3.5-flash,gemini-2.0-flash
      - key: GEMINI_MAX_RPM
        value: "5"
      - key: FREE_TIER_DAILY_LIMIT
        value: "10"
      # --- secrets: set these in the Render dashboard (sync:false) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: DATABASE_URL
        sync: false
